name: Sveltia Admin E2E

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "packages/sveltia-admin/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/sveltia-admin/**"

permissions:
  contents: read

jobs:
  run-sveltia-admin-e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @lightnet/sveltia-admin exec playwright install --with-deps chromium
      - run: pnpm --filter @lightnet/sveltia-admin e2e
      - uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: sveltia-admin-playwright-report
          path: packages/sveltia-admin/playwright-report/
          retention-days: 30
